query RunInput {
  cart {
    lines {
      id
      quantity
      cost {
        totalAmount {
          amount
        }
      }
      bundleItem: attribute(key: "_bundle_item") {
        value
      }
      merchandise {
        ... on ProductVariant {
          __typename
          product {
            id
            metafield(namespace: "custom", key: "volume_discount_tiers") {
              jsonValue
            }
          }
        }
      }
    }
  }
}
