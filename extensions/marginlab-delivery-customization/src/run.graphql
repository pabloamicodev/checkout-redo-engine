query RunInput {
  cart {
    attribute(key: "_ml_experiments") {
      value
    }
    deliveryGroups {
      deliveryOptions {
        handle
        title
      }
    }
  }
  deliveryCustomization {
    metafield(namespace: "$app:marginlab", key: "shipping-customization-config") {
      jsonValue
    }
  }
}
