query RunInput {
  cart {
    mlExperiments: attribute(key: "_ml_experiments") {
      value
    }
    cost {
      subtotalAmount {
        amount
        currencyCode
      }
    }
  }
  discountNode {
    metafield(namespace: "$app:marginlab", key: "order-discount-config") {
      jsonValue
    }
  }
}
